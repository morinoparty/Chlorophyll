name: PR Check

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write
  contents: write

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_EC2_METADATA_DISABLED: true
  AWS_REGION: auto
  AWS_CLI_FILE_ENCODING: UTF-8
  AWS_DEFAULT_S3_SIGNATURE_VERSION: s3v4
  S3_UPLOAD_BUCKET: ${{ secrets.S3_UPLOAD_BUCKET }}
  S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
  PREVIEW_BASE_URL: https://moripa-ci.nikomaru.dev/chlorophyll

jobs:
  # コミットSHAを取得
  setup:
    runs-on: ubuntu-latest
    outputs:
      commit_sha: ${{ steps.vars.outputs.commit_sha }}
    steps:
      - uses: actions/checkout@v6

      - name: Set short git commit SHA
        id: vars
        run: |
          calculatedSha=$(git rev-parse --short HEAD)
          echo "commit_sha=$calculatedSha" >> $GITHUB_OUTPUT

  # mainブランチでベースラインスナップショットを取得
  baseline:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: pnpm/action-setup@v5
        name: Install pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build Storybook
        run: pnpm --filter @chlorophyll/storybook build

      - name: Install Playwright Browsers
        run: pnpm --filter @chlorophyll/storybook exec playwright install --with-deps

      - name: Capture baseline snapshots
        run: pnpm --filter @chlorophyll/storybook exec playwright test --update-snapshots

      - name: Upload baseline snapshots
        uses: actions/upload-artifact@v7
        with:
          name: vrt-baseline-snapshots
          path: storybook/tests/e2e/vrt.spec.ts-snapshots/
          retention-days: 1

  # PRブランチでベースラインと比較
  compare:
    needs: [setup, baseline]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      test_total: ${{ steps.test-results.outputs.total }}
      test_passed: ${{ steps.test-results.outputs.passed }}
      test_failed: ${{ steps.test-results.outputs.failed }}
      test_flaky: ${{ steps.test-results.outputs.flaky }}
      test_skipped: ${{ steps.test-results.outputs.skipped }}
      test_result: ${{ steps.vrt.outcome }}
    env:
      COMMIT_SHORT_SHA: ${{ needs.setup.outputs.commit_sha }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: pnpm/action-setup@v5
        name: Install pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build Storybook
        run: pnpm --filter @chlorophyll/storybook build

      - name: Install Playwright Browsers
        run: pnpm --filter @chlorophyll/storybook exec playwright install --with-deps

      - name: Download baseline snapshots
        uses: actions/download-artifact@v8
        with:
          name: vrt-baseline-snapshots
          path: storybook/tests/e2e/vrt.spec.ts-snapshots/

      - name: Run VRT against baseline
        id: vrt
        continue-on-error: true
        env:
          PLAYWRIGHT_JSON_OUTPUT_NAME: test-results.json
        run: pnpm --filter @chlorophyll/storybook exec playwright test --reporter=html,json

      - name: Parse test results
        id: test-results
        if: ${{ !cancelled() }}
        run: |
          if [ -f storybook/test-results.json ]; then
            passed=$(jq '.stats.expected // 0' storybook/test-results.json)
            failed=$(jq '.stats.unexpected // 0' storybook/test-results.json)
            flaky=$(jq '.stats.flaky // 0' storybook/test-results.json)
            skipped=$(jq '.stats.skipped // 0' storybook/test-results.json)
            total=$((passed + failed + flaky + skipped))
            echo "total=$total" >> $GITHUB_OUTPUT
            echo "passed=$passed" >> $GITHUB_OUTPUT
            echo "failed=$failed" >> $GITHUB_OUTPUT
            echo "flaky=$flaky" >> $GITHUB_OUTPUT
            echo "skipped=$skipped" >> $GITHUB_OUTPUT
          else
            echo "total=0" >> $GITHUB_OUTPUT
            echo "passed=0" >> $GITHUB_OUTPUT
            echo "failed=0" >> $GITHUB_OUTPUT
            echo "flaky=0" >> $GITHUB_OUTPUT
            echo "skipped=0" >> $GITHUB_OUTPUT
          fi

      - name: Upload Playwright report to S3
        if: ${{ !cancelled() }}
        run: |
          aws configure set default.s3.max_concurrent_requests 50

          S3_BASE="s3://${{ env.S3_UPLOAD_BUCKET }}/chlorophyll/${{ env.COMMIT_SHORT_SHA }}"
          S3_OPTS="--endpoint-url ${{ env.S3_ENDPOINT }} --only-show-errors"

          aws s3 cp storybook/playwright-report $S3_BASE/playwright-report $S3_OPTS --recursive

      - name: Upload Playwright report as artifact
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: storybook/playwright-report/
          retention-days: 30

  # PreviewデプロイをVRTと並行して実行
  preview:
    runs-on: ubuntu-latest
    outputs:
      storybook_url: ${{ steps.deploy-storybook-preview.outputs.deployment-url }}
      docs_url: ${{ steps.deploy-docs-preview.outputs.deployment-url }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        name: Install pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build storybook
        run: pnpm --filter @chlorophyll/storybook build

      - name: Build docs
        run: pnpm --filter @chlorophyll/docs build

      - name: Deploy storybook preview
        id: deploy-storybook-preview
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_KEY }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: storybook
          packageManager: pnpm
          command: versions upload --message "Deployed pages by GitHub Actions branch ${{ github.ref_name }}"

      - name: Deploy docs preview
        id: deploy-docs-preview
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_KEY }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: docs
          packageManager: pnpm
          command: versions upload --message "Deployed pages by GitHub Actions branch ${{ github.ref_name }}"

  # PRに統合レポートをコメント
  comment:
    needs: [setup, compare, preview]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Create unified PR comment
        env:
          PLAYWRIGHT_REPORT_URL: "${{ env.PREVIEW_BASE_URL }}/${{ needs.setup.outputs.commit_sha }}/playwright-report/index.html"
          STORYBOOK_URL: ${{ needs.preview.outputs.storybook_url }}
          DOCS_URL: ${{ needs.preview.outputs.docs_url }}
          TEST_TOTAL: ${{ needs.compare.outputs.test_total || '0' }}
          TEST_PASSED: ${{ needs.compare.outputs.test_passed || '0' }}
          TEST_FAILED: ${{ needs.compare.outputs.test_failed || '0' }}
          TEST_FLAKY: ${{ needs.compare.outputs.test_flaky || '0' }}
          TEST_SKIPPED: ${{ needs.compare.outputs.test_skipped || '0' }}
          TEST_RESULT: ${{ needs.compare.outputs.test_result }}
          VRT_CONCLUSION: ${{ needs.compare.result }}
          PREVIEW_CONCLUSION: ${{ needs.preview.result }}
          COMMIT_SHORT_SHA: ${{ needs.setup.outputs.commit_sha }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # VRTのステータスを判定
          if [ "$TEST_RESULT" = "success" ]; then
            VRT_STATUS="✅ Passed"
          elif [ "$VRT_CONCLUSION" = "cancelled" ]; then
            VRT_STATUS="⏹️ Cancelled"
          elif [ "$VRT_CONCLUSION" = "skipped" ]; then
            VRT_STATUS="⏭️ Skipped"
          else
            VRT_STATUS="❌ Failed"
          fi

          LIMIT_TIME=$(date -d "7 days" +%Y-%m-%d)

          # コメントを構築
          {
            echo "## 📋 PR Report"
            echo ""
            echo "### 🧪 Visual Regression Test — ${VRT_STATUS}"
            echo ""
            echo "| Status | Count |"
            echo "|--------|-------|"
            echo "| ✅ Passed | ${TEST_PASSED} |"
            echo "| ❌ Failed | ${TEST_FAILED} |"
            echo "| 🔄 Flaky | ${TEST_FLAKY} |"
            echo "| ⏭️ Skipped | ${TEST_SKIPPED} |"
            echo "| **Total** | **${TEST_TOTAL}** |"
            echo ""
            echo "📊 [View Playwright Report](${PLAYWRIGHT_REPORT_URL})"
            echo ""
            echo "---"
            echo ""
            echo "### 🚀 Preview Deployments"
            echo ""
            if [ "$PREVIEW_CONCLUSION" = "success" ]; then
              echo "<table>"
              echo "  <tr>"
              echo "    <th scope=\"row\">Storybook</th>"
              echo "    <td><a href=\"${STORYBOOK_URL}\">${STORYBOOK_URL}</a></td>"
              echo "  </tr>"
              echo "  <tr>"
              echo "    <th scope=\"row\">Docs</th>"
              echo "    <td><a href=\"${DOCS_URL}\">${DOCS_URL}</a></td>"
              echo "  </tr>"
              echo "</table>"
            else
              echo "⚠️ Preview deployment failed or was cancelled."
            fi
            echo ""
            echo "---"
            echo "Available for 7 days (until ${LIMIT_TIME}) · **Commit:** \`${COMMIT_SHORT_SHA}\`"
          } > comment.md

          gh pr comment ${{ github.event.number }} --body-file comment.md
