name: Visual Regression Test

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write
  contents: read

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_EC2_METADATA_DISABLED: true
  AWS_REGION: auto
  AWS_CLI_FILE_ENCODING: UTF-8
  AWS_DEFAULT_S3_SIGNATURE_VERSION: s3v4
  S3_UPLOAD_BUCKET: ${{ secrets.S3_UPLOAD_BUCKET }}
  S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
  PREVIEW_BASE_URL: https://moripa-ci.nikomaru.dev/chlorophyll

jobs:
  # コミットSHAを取得
  setup:
    runs-on: ubuntu-latest
    outputs:
      commit_sha: ${{ steps.vars.outputs.commit_sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Set short git commit SHA
        id: vars
        run: |
          calculatedSha=$(git rev-parse --short HEAD)
          echo "commit_sha=$calculatedSha" >> $GITHUB_OUTPUT

  # mainブランチでベースラインスナップショットを取得
  baseline:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        name: Install pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build Storybook
        run: pnpm --filter @chlorophyll/storybook build

      - name: Install Playwright Browsers
        run: pnpm --filter @chlorophyll/storybook exec playwright install --with-deps

      - name: Capture baseline snapshots
        run: pnpm --filter @chlorophyll/storybook exec playwright test --update-snapshots

      - name: Upload baseline snapshots
        uses: actions/upload-artifact@v4
        with:
          name: vrt-baseline-snapshots
          path: storybook/tests/e2e/vrt.spec.ts-snapshots/
          retention-days: 1

  # PRブランチでベースラインと比較
  compare:
    needs: [setup, baseline]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      COMMIT_SHORT_SHA: ${{ needs.setup.outputs.commit_sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        name: Install pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build Storybook
        run: pnpm --filter @chlorophyll/storybook build

      - name: Install Playwright Browsers
        run: pnpm --filter @chlorophyll/storybook exec playwright install --with-deps

      - name: Download baseline snapshots
        uses: actions/download-artifact@v4
        with:
          name: vrt-baseline-snapshots
          path: storybook/tests/e2e/vrt.spec.ts-snapshots/

      - name: Run VRT against baseline
        continue-on-error: true
        run: pnpm --filter @chlorophyll/storybook test:vrt

      - name: Upload Playwright report to S3
        if: ${{ !cancelled() }}
        run: |
          aws configure set default.s3.max_concurrent_requests 50

          S3_BASE="s3://${{ env.S3_UPLOAD_BUCKET }}/chlorophyll/${{ env.COMMIT_SHORT_SHA }}"
          S3_OPTS="--endpoint-url ${{ env.S3_ENDPOINT }} --only-show-errors"

          aws s3 cp storybook/playwright-report $S3_BASE/playwright-report $S3_OPTS --recursive

      - name: Upload Playwright report as artifact
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: storybook/playwright-report/
          retention-days: 30

  # PRにレポートリンクをコメント
  comment:
    needs: [setup, compare]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    env:
      COMMIT_SHORT_SHA: ${{ needs.setup.outputs.commit_sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Get expiry date
        id: limit-time
        run: |
          limit_time=$(date -d "7 days" +%Y-%m-%d)
          echo "LIMIT_TIME=$limit_time" >> $GITHUB_ENV

      - name: Create PR comment
        env:
          PLAYWRIGHT_REPORT_URL: "${{ env.PREVIEW_BASE_URL }}/${{ env.COMMIT_SHORT_SHA }}/playwright-report/index.html"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat << EOF > comment.md
          ## 🧪 Visual Regression Test Results

          | Resource | Link |
          |----------|------|
          | 📊 Playwright Report | [View Report]($PLAYWRIGHT_REPORT_URL) |

          Available for 7 days (until $LIMIT_TIME)

          **Commit:** \`$COMMIT_SHORT_SHA\`
          EOF

          gh pr comment ${{ github.event.number }} --body-file comment.md
