name: Visual Regression Test

# storycap でスクリーンショットを取得し、reg-suit で差分検出する。
# - reg-keygen-git-hash-plugin: git 履歴から比較対象のベースコミットを特定
# - reg-publish-s3-plugin: 期待値スナップショット / 実行結果 / レポートを R2(S3 互換) で授受
# - reg-notify-github-plugin: PR コメントと commit status で結果を通知
on:
  workflow_call:

env:
  # R2(S3 互換) 認証情報。reg-publish-s3-plugin が AWS SDK 経由で参照する
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_EC2_METADATA_DISABLED: true
  AWS_REGION: auto
  # regconfig.json が ${VAR} で展開する値
  S3_UPLOAD_BUCKET: ${{ secrets.S3_UPLOAD_BUCKET }}
  S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
  REG_NOTIFY_GITHUB_CLIENT_ID: ${{ secrets.REG_NOTIFY_GITHUB_CLIENT_ID }}

jobs:
  vrt:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          # reg-keygen-git-hash-plugin がベースコミットを辿るため全履歴が必要
          fetch-depth: 0

      - uses: pnpm/action-setup@v5
        name: Install pnpm

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Cache Puppeteer Chromium
        id: puppeteer-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/puppeteer
          key: puppeteer-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      # puppeteer は onlyBuiltDependencies で許可されており、install 時の postinstall で
      # Chromium をダウンロードする(キャッシュ済みなら再ダウンロードはスキップされる)
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Storybook
        run: pnpm --filter @chlorophyll/storybook build

      # storycap(簡易モード)でビルド済み Storybook を巡回し __screenshots__ に保存
      - name: Capture screenshots (storycap)
        run: pnpm --filter @chlorophyll/storybook vrt:capture

      # reg-suit がベースラインと比較し、結果を R2 へ公開して GitHub に通知する
      - name: Run reg-suit
        run: pnpm --filter @chlorophyll/storybook vrt:run
