name: test-a11y

on: [pull_request]

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install

      # test-storybook uses the same Playwright version as @chlorophyll/storybook (chromium headless shell)
      - name: Install Playwright Browsers
        run: pnpm --filter @chlorophyll/storybook exec playwright install chromium --with-deps

      - name: Build Storybook
        run: pnpm --filter @chlorophyll/storybook build

      - name: Test
        run: pnpm --filter @chlorophyll/storybook test:runner

      - name: Publish test results
        uses: mikepenz/action-junit-report@v5
        if: success() || failure()
        with:
          report_paths: 'storybook/reports/junit.xml'